name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm test -- --coverage

      - uses: dorny/test-reporter@3d76b34a4535afbd0600d347b09a6ee5deb3ed7f # v2.6.0
        if: always()
        with:
          name: Vitest
          path: reports/junit.xml
          reporter: jest-junit

      - uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/build

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist
          path: dist/

  integration:
    needs: build
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: dist
          path: dist/

      - name: Run action
        id: resolve
        uses: ./
        with:
          project_file: tests/fixtures/TestApp/TestApp.xcodeproj

      - name: Verify outputs
        env:
          DEPENDENCIES_CHANGED: ${{ steps.resolve.outputs.dependenciesChanged }}
          SUMMARY: ${{ steps.resolve.outputs.summary }}
        run: |
          echo "dependenciesChanged=${DEPENDENCIES_CHANGED}"
          echo "summary=${SUMMARY}"
          if [ "${DEPENDENCIES_CHANGED}" != "true" ]; then
            echo "::error::Expected dependenciesChanged to be 'true', got '${DEPENDENCIES_CHANGED}'"
            exit 1
          fi
          if [ -z "${SUMMARY}" ]; then
            echo "::error::Expected summary to be non-empty"
            exit 1
          fi

      - name: Verify repo is clean except Package.resolved
        run: |
          CHANGED=$(git diff --name-only)
          echo "Changed files: ${CHANGED}"
          UNEXPECTED=$(echo "${CHANGED}" | grep -v -e 'Package.resolved' -e '^dist/' || true)
          if [ -n "${UNEXPECTED}" ]; then
            echo "::error::Unexpected changed files after action: ${UNEXPECTED}"
            exit 1
          fi
          UNTRACKED=$(git ls-files --others --exclude-standard)
          echo "Untracked files: ${UNTRACKED}"
          if [ -n "${UNTRACKED}" ]; then
            echo "::error::Unexpected untracked files after action: ${UNTRACKED}"
            exit 1
          fi

  integration-workspace:
    needs: build
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: dist
          path: dist/

      - name: Run action with workspace
        id: resolve
        uses: ./
        with:
          workspace_file: tests/fixtures/TestWorkspce/TestWorkspace.xcworkspace
          scheme: TestWorkspce

      - name: Verify outputs
        env:
          DEPENDENCIES_CHANGED: ${{ steps.resolve.outputs.dependenciesChanged }}
          SUMMARY: ${{ steps.resolve.outputs.summary }}
        run: |
          echo "dependenciesChanged=${DEPENDENCIES_CHANGED}"
          echo "summary=${SUMMARY}"
          if [ "${DEPENDENCIES_CHANGED}" != "true" ]; then
            echo "::error::Expected dependenciesChanged to be 'true', got '${DEPENDENCIES_CHANGED}'"
            exit 1
          fi
          if [ -z "${SUMMARY}" ]; then
            echo "::error::Expected summary to be non-empty"
            exit 1
          fi

      - name: Verify repo is clean except Package.resolved
        run: |
          CHANGED=$(git diff --name-only)
          echo "Changed files: ${CHANGED}"
          UNEXPECTED=$(echo "${CHANGED}" | grep -v -e 'Package.resolved' -e '^dist/' || true)
          if [ -n "${UNEXPECTED}" ]; then
            echo "::error::Unexpected changed files after action: ${UNEXPECTED}"
            exit 1
          fi
          UNTRACKED=$(git ls-files --others --exclude-standard)
          echo "Untracked files: ${UNTRACKED}"
          if [ -n "${UNTRACKED}" ]; then
            echo "::error::Unexpected untracked files after action: ${UNTRACKED}"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check
