name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm test -- --coverage

      - uses: dorny/test-reporter@b082adf0eced0765477756c2a610396589b8c637 # v2.5.0
        if: always()
        with:
          name: Vitest
          path: reports/junit.xml
          reporter: jest-junit

      - uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/build

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  integration:
    needs: build
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - name: Run action
        id: resolve
        uses: ./
        with:
          project_file: tests/fixtures/TestApp/TestApp.xcodeproj

      - name: Verify outputs
        env:
          DEPENDENCIES_CHANGED: ${{ steps.resolve.outputs.dependenciesChanged }}
          SUMMARY: ${{ steps.resolve.outputs.summary }}
        run: |
          echo "dependenciesChanged=${DEPENDENCIES_CHANGED}"
          echo "summary=${SUMMARY}"
          if [ -z "${DEPENDENCIES_CHANGED}" ]; then
            echo "::error::Expected dependenciesChanged output to be set"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run format:check
