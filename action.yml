name: Xcode Packages Update
description: Resolves Xcode Swift Package Manager dependencies and reports what changed.

inputs:
  project_file:
    description: Path to the .xcodeproj file. Mutually exclusive with workspace_file.
    required: false
  workspace_file:
    description: Path to the .xcworkspace file. Mutually exclusive with project_file. Requires scheme.
    required: false
  scheme:
    description: Xcode scheme to use. Required when workspace_file is provided. Must be a shared scheme. Ignored when using project_file.
    required: false
  temporary_packages_dir_path:
    description: Path to a temporary directory for cloned SPM sources
    required: false
    default: .spm-tmp

outputs:
  dependenciesChanged:
    description: 'true if any package was added, removed or updated'
  summary:
    description: 'Human-readable list of added, removed and updated packages'

branding:
  icon: package
  color: orange

runs:
  using: 'node24'
  main: 'dist/main/index.cjs'
  post: 'dist/post/index.cjs'
  post-if: 'always()'
